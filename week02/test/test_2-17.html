<!-- 

표 아래쪽에 한 줄(tr)을 추가하고 임의의 이미지 삽입

-->

<!DOCTYPE html>
<html>
<head><title>표에 이미지 삽입</title></head>
<body>
<h3>표에 이미지 삽입</h3>
<hr>
<table>
    <caption>좋아하는 과일</caption>
    <tbody>
        <tr>
            <td><img src="../media/apple.jpg"></td>
            <td><img src="../media/banana.jpg"></td>
            <td><img src="../media/mango.jpg"></td>
        </tr>
        <tr><td><img src="../media/alert.png"></td></tr>
    </tbody>
</table>
</body>
</html>
