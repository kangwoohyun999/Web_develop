<!-- 기본 표 만들기 (중요) -->

<!DOCTYPE html>
<html>
<head><title>기본 테이블 만들기</title></head>
<body>
<h3>기본 구조를 가진 표</h3>
<hr>
<table border="1">
<caption>1학기 성적</caption>
<thead>
<tr><th>이름</th><th>HTML</th><th>CSS</th></tr>
</thead>
<tfoot>
<tr><th>합</th><th>225</th><th>230</th></tr>
</tfoot>
<tbody>
<tr><td>황기태</td><td>80</td><td>70</td></tr>
<tr><td>이재문</td><td>95</td><td>99</td></tr>
<tr><td>이병은</td><td>40</td><td>61</td></tr>
</tbody>
</table>
</body>
</html>

<!-- 

<실습-1> thead, ftoot, tbody 모두 삭제

<실습-2> 모든 th를 td로 수정

<실습-3> (중요) colspan과 rowspan을 이용하여 <예제 2-16>을 다음과 같이 수정
- colspan : 열 merge; ex) <td colspan = "3">
- rowspan : 행 merge; ex) <th rowspan = "2">

-->
