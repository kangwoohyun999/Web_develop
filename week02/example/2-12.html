<!-- <ol>로 라면 끓이는 순서 나열 -->

<!DOCTYPE html>
<html>
<head>
<title>라면을 끓이는 순서</title>
</head>
<body>
<h3>라면을 끓이는 순서</h3>
<hr>
<ol type="A" >
<li>물을 끓인다.</li>
<li>라면과 스프를 넣는다.</li>
<li>파를 썰어 넣는다.</li>
<li>5분 후 먹는다.</li>
</ol>
</body>
</html>

<!-- 

<실습-1> type 속성 값을 “1”, “a”, “I”, “i”로 변경한 후 각각의 결과 확인
